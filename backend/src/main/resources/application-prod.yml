spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}

app:
  frontend-url: https://monsalon.com

springdoc:
  api-docs:
    enabled: false

  swagger-ui:
    enabled: false